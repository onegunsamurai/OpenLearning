name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Tests
        run: pytest tests/ -v

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docs-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'mkdocs.yml'

      - uses: actions/setup-python@v6
        if: steps.filter.outputs.docs == 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.filter.outputs.docs == 'true'
        run: pip install -r docs/requirements.txt

      - name: Build docs (strict)
        if: steps.filter.outputs.docs == 'true'
        run: mkdocs build --strict

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify no .env files tracked
        run: |
          tracked_env=$(git ls-files '*.env' '.env*' '**/.env' '**/.env*' | grep -v '\.env\.example$' || true)
          if [ -n "$tracked_env" ]; then
            echo "ERROR: .env files are tracked by git:"
            echo "$tracked_env"
            exit 1
          fi
          echo "No .env files tracked — OK"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'backend/Dockerfile'
              - 'backend/requirements.txt'
              - 'frontend/Dockerfile'
              - 'frontend/package.json'
              - 'frontend/package-lock.json'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build Docker images
        if: steps.filter.outputs.docker == 'true'
        uses: docker/bake-action@v6
        with:
          files: docker-compose.yml
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
